    const BOARD_SPACES = [
      { id: 0, name: '起點', type: 'go', description: '經過收集 $200 + 股票分紅' },
      { id: 1, name: '地中海大道', type: 'property', color: 'brown', price: 60, houseCost: 50, rent: [2, 10, 30, 90, 160, 250] },

      { id: 13, name: '政治家大道', type: 'property', color: 'pink', price: 140, houseCost: 100, rent: [10, 50, 150, 450, 625, 750] },
      { id: 14, name: '維吉尼亞大道', type: 'property', color: 'pink', price: 160, houseCost: 100, rent: [12, 60, 180, 500, 700, 900] },

      { id: 16, name: '聖詹姆斯廣場', type: 'property', color: 'orange', price: 180, houseCost: 100, rent: [14, 70, 200, 550, 750, 950] },
      { id: 17, name: '社區基金', type: 'community' },
      { id: 18, name: '田納西大道', type: 'property', color: 'orange', price: 180, houseCost: 100, rent: [14, 70, 200, 550, 750, 950] },
      { id: 19, name: '紐約大道', type: 'property', color: 'orange', price: 200, houseCost: 100, rent: [16, 80, 220, 600, 800, 1000] },
      { id: 20, name: '免費停車', type: 'parking' },
      { id: 21, name: '肯塔基大道', type: 'property', color: 'red', price: 220, houseCost: 150, rent: [18, 90, 250, 700, 875, 1050] },
      { id: 22, name: '機會', type: 'chance' },
      { id: 23, name: '印第安納大道', type: 'property', color: 'red', price: 220, houseCost: 150, rent: [18, 90, 250, 700, 875, 1050] },
      { id: 24, name: '伊利諾伊大道', type: 'property', color: 'red', price: 240, houseCost: 150, rent: [20, 100, 300, 750, 925, 1100] },
      { id: 25, name: 'B&O 鐵路', type: 'railroad', price: 200 },
      { id: 26, name: '大西洋大道', type: 'property', color: 'yellow', price: 260, houseCost: 150, rent: [22, 110, 330, 800, 975, 1150] },
      { id: 27, name: '文特諾大道', type: 'property', color: 'yellow', price: 260, houseCost: 150, rent: [22, 110, 330, 800, 975, 1150] },
      { id: 28, name: '自來水廠', type: 'utility', price: 150 },
      { id: 29, name: '馬文花園', type: 'property', color: 'yellow', price: 280, houseCost: 150, rent: [24, 120, 360, 850, 1025, 1200] },
      { id: 30, name: '直接入獄', type: 'gotojail' },
      { id: 31, name: '太平洋大道', type: 'property', color: 'green', price: 300, houseCost: 200, rent: [26, 130, 390, 900, 1100, 1275] },
      { id: 32, name: '北卡羅萊納大道', type: 'property', color: 'green', price: 300, houseCost: 200, rent: [26, 130, 390, 900, 1100, 1275] },
      { id: 33, name: '社區基金', type: 'community' },
      { id: 34, name: '賓夕法尼亞大道', type: 'property', color: 'green', price: 320, houseCost: 200, rent: [28, 150, 450, 1000, 1200, 1400] },
      { id: 35, name: '短線鐵路', type: 'railroad', price: 200 },
      { id: 36, name: '機會', type: 'chance' },
      { id: 37, name: '公園廣場', type: 'property', color: 'blue', price: 350, houseCost: 200, rent: [35, 175, 500, 1100, 1300, 1500] },
      { id: 38, name: '奢侈稅', type: 'tax', amount: 100 },
      { id: 39, name: '木板路', type: 'property', color: 'blue', price: 400, houseCost: 200, rent: [50, 200, 600, 1400, 1700, 2000] },
    ];

    const COLOR_MAP = { brown: '#8B4513', lightblue: '#87CEFA', pink: '#FF69B4', orange: '#FFA500', red: '#EF4444', yellow: '#EAB308', green: '#10B981', blue: '#3B82F6' };
    const HEX_TO_RGBA = (hex, alpha) => {
       if(!hex) return 'transparent';
       const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
       return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    };

    const DEFAULT_GAME_STATE = {
      status: 'lobby', players: [], turnIndex: 0, properties: {}, phase: 'waiting_roll', pendingAction: null, dice: [1, 1],
      chat: [], roundCount: 1, turnStartTime: Date.now(),
      stocks: { prices: { tech: 100, realEstate: 100 }, history: { tech: [100], realEstate: [100] } },
      auction: { active: false, spaceId: null, currentBid: 0, highestBidder: null, endTime: 0 },
      worldEvent: WORLD_EVENTS[0],
      lottery: { pot: 1000, tickets: [], roundsLeft: 3 },
      boss: { active: true, name: '貪婪惡龍', avatar: '🐉', hp: 5000, maxHp: 5000, position: 20, level: 1 }
    };

    const appendLog = (currentChat, text) => {
        const newChat = [...(currentChat || [])];
        newChat.push({ id: Date.now() + Math.random(), sender: '系統', text, isSystem: true });
        return newChat.slice(-50);
    };

    function App() {
      const [user, setUser] = useState(null);
      const [roomId, setRoomId] = useState('');
      const [inputRoomCode, setInputRoomCode] = useState('');
      const [gameState, setGameState] = useState(null);
      const [playerName, setPlayerName] = useState('');
      const [playerAvatar, setPlayerAvatar] = useState(AVATARS[0]);
      const [selectedTalent, setSelectedTalent] = useState(TALENTS[0].id);
      
      const [showExpansionModal, setShowExpansionModal] = useState(false);
      const [expansionTab, setExpansionTab] = useState('stock'); 
      const [selectedSpaceId, setSelectedSpaceId] = useState(null);
      const [modalConfig, setModalConfig] = useState({ show: false, msg: '', customRender: null });
      const [timeLeft, setTimeLeft] = useState(60);
      
      // 視覺位置狀態 (用於動畫)
      const [visualPos, setVisualPos] = useState({});

      const chatEndRef = useRef(null);

      const showAlert = (msg) => setModalConfig({ show: true, msg });
      const closeModal = () => setModalConfig({ show: false, msg: '', customRender: null });

      useEffect(() => {
        const initAuth = async () => {
          try { await signInAnonymously(auth); } 
          catch (error) { console.error(error); }
        };
        initAuth();
        const unsub = onAuthStateChanged(auth, setUser);
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!user || !roomId || !db) return;
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', `monopoly_chaos_${roomId}`);
        const unsub = onSnapshot(roomRef, snap => { 
           if (snap.exists()) setGameState(snap.data()); 
           else setDoc(roomRef, DEFAULT_GAME_STATE).catch(console.error);
        }, console.error);
        return () => unsub();
      }, [user, roomId]);

      // 棋子移動動畫邏輯
      useEffect(() => {
         if (!gameState) return;
         const newVis = { ...visualPos };
         let changed = false;
         
         gameState.players.forEach(p => {
            if (newVis[p.id] === undefined) {
               newVis[p.id] = p.position;
               changed = true;
            } else if (newVis[p.id] !== p.position) {
               // 如果在監獄且視覺位置不是 10，直接跳過去 (被抓)
               if (p.inJail && newVis[p.id] !== 10 && p.position === 10) {
                  newVis[p.id] = 10;
                  changed = true;
               } else {
                  // 否則一步一步走
                  setTimeout(() => {
                     setVisualPos(prev => ({...prev, [p.id]: (prev[p.id] + 1) % 40}));
                  }, 150);
               }
            }
         });
         if (changed) setVisualPos(newVis);
      }, [gameState, visualPos]);

      useEffect(() => { chatEndRef.current?.scrollIntoView(); }, [gameState?.chat]);

      useEffect(() => {
         const interval = setInterval(() => {
            if (!gameState || gameState.status !== 'playing') return;
            const now = Date.now();
            if (gameState.auction?.active) {
               const t = Math.max(0, Math.floor((gameState.auction.endTime - now)/1000));
               setTimeLeft(t);
               if (t === 0 && user?.uid === gameState.players[gameState.turnIndex]?.id) resolveAuction();
            } else {
               const t = Math.max(0, Math.floor(60 - (now - gameState.turnStartTime)/1000));
               setTimeLeft(t);
               if (t === 0 && gameState.players[gameState.turnIndex]?.id === user?.uid) forceEndTurn();
            }
         }, 1000);
         return () => clearInterval(interval);
      }, [gameState, user]);

      const updateGame = async (updates) => {
        if (!user || !roomId) return;
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', `monopoly_chaos_${roomId}`), updates).catch(console.error);
      };

      const joinGameSlot = async () => {
        if (gameState.players.find(p => p.id === user.uid) || gameState.players.length >= 6) return;
        const newPlayer = {
          id: user.uid, name: playerName.trim(), color: PLAYER_COLORS[gameState.players.length], avatar: playerAvatar,
          money: selectedTalent==='rich' ? 2500 : 1500, position: 0, inJail: false, jailTurns: 0, isBankrupt: false,
          stocksOwned: { tech: selectedTalent==='investor'?15:0, realEstate: 0 }, items: { remoteDice: 0, turtle: 0, shield: 0 },
          talent: selectedTalent, achievements: [], debt: 0, pet: null, statusEffects: {}
        };
        await updateGame({ players: [...gameState.players, newPlayer], chat: appendLog(gameState.chat, `👋 ${newPlayer.name} 加入了遊戲！`) });
      };

      const passTurnToNext = (state) => {
        let nextChat = [...(state.chat || [])];
        const log = (txt) => { nextChat = appendLog(nextChat, txt); };

        let nextIdx = (state.turnIndex + 1) % state.players.length;
        let p = state.players[nextIdx];
        while (p && p.isBankrupt && state.players.filter(x=>!x.isBankrupt).length > 1) {
          nextIdx = (nextIdx + 1) % state.players.length; p = state.players[nextIdx];
        }
        let updates = { turnIndex: nextIdx, phase: 'waiting_roll', pendingAction: null, turnStartTime: Date.now() };
        let newRound = nextIdx <= state.turnIndex || state.players.filter(x=>!x.isBankrupt).length <= 1;
        if(state.players.length === 1) newRound = true;

        if (newRound) {
           updates.roundCount = state.roundCount + 1;
           let pUpdates = [...state.players];
           
           let lotteryUpdate = { ...state.lottery, roundsLeft: state.lottery.roundsLeft - 1 };
           if (lotteryUpdate.roundsLeft <= 0) {
              if (lotteryUpdate.tickets.length > 0) {
                 const winnerId = lotteryUpdate.tickets[Math.floor(Math.random()*lotteryUpdate.tickets.length)];
                 const wIdx = pUpdates.findIndex(x=>x.id===winnerId);
                 if(wIdx !== -1) {
                    pUpdates[wIdx].money += lotteryUpdate.pot;
                    log(`🎟️ 國家樂透開獎！恭喜 ${pUpdates[wIdx].name} 獨得 $${lotteryUpdate.pot} 大獎！`);
                 }
              } else {
                 log(`🎟️ 國家樂透開獎！本期無人購買，獎金將繼續累積！`);
              }
              lotteryUpdate = { pot: 1000, tickets: [], roundsLeft: 3 };
           }

           pUpdates.forEach(px => { 
              if(px.statusEffects?.turtleTurns > 0) px.statusEffects.turtleTurns--; 
              if(px.debt > 0) px.debt = Math.floor(px.debt * 1.05); 
           });
           updates.players = pUpdates;
           updates.lottery = lotteryUpdate;

           let tPrice = state.stocks.prices.tech, rPrice = state.stocks.prices.realEstate;
           let tBoost = state.worldEvent.effect?.stockBoost === 'tech' ? 50 : 0;
           tPrice = Math.max(10, tPrice + Math.floor(Math.random()*41)-20 + tBoost);
           rPrice = Math.max(10, rPrice + Math.floor(Math.random()*41)-20);
           updates.stocks = { prices: { tech: tPrice, realEstate: rPrice }, history: { tech: [...state.stocks.history.tech, tPrice].slice(-10), realEstate: [...state.stocks.history.realEstate, rPrice].slice(-10) } };
           
           const tDiff = tPrice - state.stocks.prices.tech;
           const rDiff = rPrice - state.stocks.prices.realEstate;
           log(`📈 股市結算：科技股 ${tDiff>=0?'▲':'▼'}$${Math.abs(tDiff)} | 地產股 ${rDiff>=0?'▲':'▼'}$${Math.abs(rDiff)}`);

           if (updates.roundCount % 4 === 0) {
              updates.worldEvent = WORLD_EVENTS[Math.floor(Math.random() * WORLD_EVENTS.length)];
              log(`🌍 世界事件更新：${updates.worldEvent.name} - ${updates.worldEvent.desc}`);
           }
        }
        updates.chat = nextChat;
        return updates;
      };

      const forceEndTurn = async () => { await updateGame(passTurnToNext(gameState)); };

      const calculateRent = (space, propData, payer, owner, diceSum) => {
        if(propData.isMortgaged || payer.id === owner.id) return 0;
        let rent = 0;
        if(space.type === 'property') {
           rent = space.rent[propData.isLandmark ? 5 : (propData.houses || 0)];
           const colorSpaces = BOARD_SPACES.filter(s => s.color === space.color);
           const isMonopoly = colorSpaces.every(s => gameState.properties[s.id]?.ownerId === owner.id);
           if (isMonopoly && !propData.isLandmark && propData.houses === 0) rent *= 2;
           else if (isMonopoly) rent = Math.floor(rent * 1.5); 
        }
        else if(space.type === 'railroad') rent = 25 * Math.pow(2, Object.values(gameState.properties).filter(p => p.ownerId === owner.id && BOARD_SPACES[p.id]?.type === 'railroad').length - 1);
        else if(space.type === 'utility') rent = (Object.values(gameState.properties).filter(p => p.ownerId === owner.id && BOARD_SPACES[p.id]?.type === 'utility').length === 2 ? 10 : 4) * diceSum;
        
        if(propData.isLandmark) rent *= 2;
        if(gameState.worldEvent.effect?.rentMult) rent = Math.floor(rent * gameState.worldEvent.effect.rentMult);
        return rent;
      };

      const executeRoll = async (d1, d2) => {
        let pIndex = gameState.turnIndex; let pUpdates = [...gameState.players]; let p = { ...pUpdates[pIndex] };
        let stateUpdates = { dice: [d1, d2] };
        let currentChat = [...gameState.chat];
        const log = (txt) => { currentChat = appendLog(currentChat, txt); };

        if (p.talent === 'runner') { d1++; d2++; }
        if (p.statusEffects?.nextRoll) p.statusEffects.nextRoll = null;

        if (p.inJail) {
          if (d1 === d2) { 
             p.inJail = false; p.jailTurns = 0; 
             log(`🎲 ${p.name} 擲出雙骰，成功逃出監獄！`);
          } else { 
             p.jailTurns++; 
             if(p.jailTurns >= 3) { 
                p.money -= 50; p.inJail = false; p.jailTurns = 0; 
                log(`💸 ${p.name} 刑滿釋放，支付 $50 出獄！`);
             } else { 
                log(`🔒 ${p.name} 擲骰失敗，繼續坐牢 (${p.jailTurns}/3 輪)`);
                stateUpdates.chat = currentChat;
                pUpdates[pIndex] = p; 
                await updateGame({ ...stateUpdates, ...passTurnToNext({ ...gameState, players: pUpdates, chat: currentChat }), players: pUpdates }); 
                return; 
             } 
          }
        }

        const oldPos = p.position; p.position = (oldPos + d1 + d2) % 40;
        
        if (p.position < oldPos && p.position !== 10) {
           let bonus = 200;
           let logText = `🏁 ${p.name} 經過起點，獲得基本獎金 $200`;
           if (p.pet === 'dog') { bonus += 300; logText += ' + 招財犬 $300'; }
           const div = (p.stocksOwned.tech + p.stocksOwned.realEstate) * 2;
           if (div > 0) { bonus += div; logText += ` + 股票分紅 $${div}`; }
           p.money += bonus;
           log(logText + '！');
        }

        const space = BOARD_SPACES[p.position];
        stateUpdates.phase = 'must_action';

        if (gameState.boss?.active && p.position === gameState.boss.position) {
           stateUpdates.pendingAction = { type: 'boss_encounter' };
        }
        else if (['property', 'railroad', 'utility'].includes(space.type)) {
          const propData = gameState.properties[space.id];
          if (!propData || !propData.ownerId) {
             stateUpdates.pendingAction = { type: 'buy', spaceId: space.id, amount: space.price };
          } else if (propData.ownerId !== p.id) {
            const ownerPlayer = gameState.players.find(x => x.id === propData.ownerId);
            const rent = calculateRent(space, propData, p, ownerPlayer, d1+d2);
            if (rent > 0) {
               stateUpdates.pendingAction = { type: 'rent', to: propData.ownerId, amount: rent, spaceId: space.id };
            } else stateUpdates.phase = 'end_turn';
          } else stateUpdates.phase = 'end_turn';
        } else if (space.type === 'tax') stateUpdates.pendingAction = { type: 'tax', amount: space.amount };
        else if (space.type === 'gotojail') { 
           p.position = 10; p.inJail = true; 
           log(`👮 ${p.name} 被抓進監獄了！`);
           stateUpdates.chat = currentChat;
           stateUpdates = { ...stateUpdates, ...passTurnToNext({ ...gameState, players: pUpdates, chat: currentChat }) }; 
        }
        else stateUpdates.phase = 'end_turn';

        stateUpdates.chat = currentChat;
        pUpdates[pIndex] = p; await updateGame({ ...stateUpdates, players: pUpdates });
      };

      const rollDice = () => {
        let p = gameState.players[gameState.turnIndex];
        if (p.statusEffects?.nextRoll) executeRoll(Math.floor(p.statusEffects.nextRoll/2), Math.ceil(p.statusEffects.nextRoll/2));
        else if (p.statusEffects?.turtleTurns > 0) executeRoll(1, 0);

      };

      const buyProperty = async () => {
        const { spaceId, amount } = gameState.pendingAction; let pUpdates = [...gameState.players]; let p = pUpdates[gameState.turnIndex];

        p.money -= amount;
        let newChat = appendLog(gameState.chat, `🏠 ${p.name} 購買了 ${BOARD_SPACES[spaceId].name}！`);
        await updateGame({ players: pUpdates, properties: { ...gameState.properties, [spaceId]: { ownerId: p.id, houses: 0, isLandmark: false } }, phase: 'end_turn', pendingAction: null, chat: newChat });
      };

      const startAuction = async () => {
         const { spaceId } = gameState.pendingAction;
         await updateGame({ phase: 'auction', pendingAction: null, auction: { active: true, spaceId, currentBid: 10, highestBidder: null, endTime: Date.now() + 15000 } });

         if (gameState.auction.endTime < Date.now()) return;

         if (p.money < gameState.auction.currentBid + amount) return showAlert("資金不足");

      const resolveAuction = async () => {
         let updates = { auction: { active: false, spaceId: null }, phase: 'end_turn' };
         let newChat = [...gameState.chat];
         if (gameState.auction.highestBidder) {
            let pUpdates = [...gameState.players];

         await updateGame(updates);

                     {expansionTab === 'stock' && (

                           <div className="bg-green-50 p-4 rounded-xl border border-green-200 shadow-sm">
                              <h4 className="text-lg font-bold">🐕 招財犬 ($800)</h4><p className="text-xs text-gray-500 mb-2">每次經過起點額外獲得 $300</p>
                              <button onClick={async()=>{ if(me.money<800)return showAlert("資金不足"); let p=[...gameState.players]; p.find(x=>x.id===me.id).money-=800; p.find(x=>x.id===me.id).pet='dog'; await updateGame({players:p}); }} className="w-full bg-green-600 text-white py-2 rounded font-bold">{me.pet==='dog'?'已裝備':'購買裝備'}</button>
                           </div>
                        </div>
                     )}
                     {expansionTab === 'bank' && (
                        <div className="space-y-4">
                           <div className="border p-4 rounded-xl bg-yellow-50 flex justify-between items-center">
                              <div><h4 className="text-lg font-bold text-yellow-800">🏦 銀行高利貸</h4><p className="text-sm text-gray-600">借款 $1000，負債 $1200</p><p className="font-bold text-red-600 mt-1">目前負債: ${me.debt}</p></div>
                              <div className="flex flex-col gap-2">
                                 <button onClick={()=>setModalConfig({show:true, msg:'確定要借款 $1000 嗎？', customRender: ()=><div className="mt-4 flex gap-2"><button onClick={async()=>{let p=[...gameState.players];let p1=p.find(x=>x.id===user.uid);p1.money+=1000;p1.debt+=1200;await updateGame({players:p});closeModal();}} className="flex-1 bg-red-600 text-white py-2 rounded font-bold">確定借款</button><button onClick={closeModal} className="flex-1 bg-gray-300 py-2 rounded font-bold">取消</button></div>})} className="bg-yellow-600 text-white px-4 py-2 rounded font-bold shadow">借款</button>
                                 {me.debt > 0 && <button onClick={()=>setModalConfig({show:true, msg:`確定還款 $${me.debt}？`, customRender: ()=><div className="mt-4 flex gap-2"><button onClick={async()=>{let p=[...gameState.players];let p1=p.find(x=>x.id===user.uid);if(p1.money<p1.debt)return showAlert("資金不足");p1.money-=p1.debt;p1.debt=0;await updateGame({players:p});closeModal();}} className="flex-1 bg-green-600 text-white py-2 rounded font-bold">確定還款</button><button onClick={closeModal} className="flex-1 bg-gray-300 py-2 rounded font-bold">取消</button></div>})} className="bg-green-600 text-white px-4 py-2 rounded font-bold shadow">還款</button>}
                              </div>
                           </div>
                           <div className="border p-4 rounded-xl bg-indigo-50 flex justify-between items-center">
                              <div><h4 className="text-lg font-bold text-indigo-800">🎟️ 國家樂透</h4><p className="text-sm text-gray-600">目前獎池: ${gameState.lottery.pot} | 開獎: {gameState.lottery.roundsLeft} 輪後</p></div>
                              <button onClick={async()=>{ if(me.money<50)return showAlert("需要 $50"); let p=[...gameState.players]; p.find(x=>x.id===user.uid).money-=50; await updateGame({players:p, lottery:{...gameState.lottery, pot:gameState.lottery.pot+50, tickets:[...gameState.lottery.tickets, user.uid]}}); }} className="bg-indigo-600 text-white px-4 py-2 rounded font-bold shadow">買彩券 ($50)</button>
                           </div>
                        </div>
                     )}
                     {expansionTab === 'casino' && (
                        <div className="flex flex-col items-center justify-center p-8 bg-purple-50 rounded-xl border border-purple-200">
                           <h3 className="text-3xl font-black text-purple-800 mb-2">🎰 皇家拉霸機</h3>
                           <p className="text-purple-600 mb-6 font-bold">花費 $100 試試手氣！最高可贏 $1000！</p>
                           <button onClick={spinCasino} className="bg-gradient-to-r from-purple-500 to-pink-500 text-white text-2xl font-black px-12 py-4 rounded-full shadow-lg hover:scale-105 transition transform">SPIN ($100)</button>
                        </div>
                     )}
                     {expansionTab === 'trade' && (
                        <div className="p-4 bg-orange-50 rounded-xl border border-orange-200">
                           <h3 className="text-xl font-bold text-orange-800 mb-4">🤝 贈與及土地轉讓</h3>
                           <form onSubmit={executeTrade} className="space-y-4">
                              <div><label className="block text-sm font-bold text-gray-700">對象</label><select name="targetId" className="w-full p-2 border rounded font-bold bg-white"><option value="">選擇目標</option>{gameState.players.filter(p=>p.id!==me.id && !p.isBankrupt).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
                              <div><label className="block text-sm font-bold text-gray-700">現金 ($)</label><input type="number" name="amount" min="0" max={me.money} defaultValue="0" className="w-full p-2 border rounded font-bold bg-white" /></div>
                              <div><label className="block text-sm font-bold text-gray-700">土地</label><select name="propId" className="w-full p-2 border rounded font-bold bg-white"><option value="none">-- 不轉讓 --</option>{Object.entries(gameState.properties).filter(([_, prop])=>prop.ownerId===me.id).map(([id, prop]) => <option key={id} value={id}>{BOARD_SPACES[id].name}</option>)}</select></div>
                              <button type="submit" className="w-full bg-orange-500 text-white py-3 rounded font-bold hover:bg-orange-600">確定交易</button>
                           </form>
                        </div>
                     )}
                  </div>
               </div>
            </div>
         );
      };

      if (fbInitError) return <div className="min-h-screen bg-white flex items-center justify-center text-red-500 font-bold p-8 text-xl">Firebase Error: {fbInitError}</div>;
      if (!user) return <div className="min-h-screen bg-white flex items-center justify-center font-bold text-3xl text-gray-800 animate-pulse">連線中...</div>;
      
      if (!roomId) return (
         <div className="min-h-screen flex items-center justify-center p-4 bg-gray-100 bg-stripes">
            <div className="bg-white p-8 rounded-3xl w-full max-w-md text-center shadow-2xl border border-gray-200">
              <h1 className="text-4xl font-black mb-2 text-blue-700 tracking-tight">終極大富翁</h1><p className="text-gray-500 font-bold mb-8">黑市犯罪版 🔪</p>
              <div className="space-y-4 mb-8">
                 <input type="text" placeholder="你的暱稱" value={playerName} onChange={e=>setPlayerName(e.target.value)} className="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 font-bold text-center text-lg" />
                 <div className="flex flex-wrap gap-2 justify-center">{AVATARS.map(emoji=><button key={emoji} onClick={()=>setPlayerAvatar(emoji)} className={`text-3xl p-2 rounded-xl transition ${playerAvatar===emoji?'bg-blue-100 scale-110 shadow-sm':''}`}>{emoji}</button>)}</div>
                 <select value={selectedTalent} onChange={e=>setSelectedTalent(e.target.value)} className="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 font-bold">{TALENTS.map(t => <option key={t.id} value={t.id}>{t.name} - {t.desc}</option>)}</select>
              </div>
              <button onClick={()=>{if(playerName)setRoomId(Math.random().toString(36).substring(2,6).toUpperCase())}} className="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 mb-4 shadow-md transition">創建新房間</button>
              <div className="flex gap-2"><input type="text" placeholder="房間代碼" value={inputRoomCode} onChange={e=>setInputRoomCode(e.target.value.toUpperCase())} maxLength={6} className="flex-1 px-4 rounded-xl bg-gray-50 border border-gray-200 font-bold uppercase text-center" /><button onClick={()=>{if(playerName&&inputRoomCode)setRoomId(inputRoomCode)}} className="bg-gray-200 text-gray-800 px-6 py-3 rounded-xl font-bold hover:bg-gray-300 transition">加入</button></div>
            </div>
         </div>
      );

      if (!gameState) return <div className="min-h-screen bg-gray-100 flex items-center justify-center text-gray-500 font-bold animate-pulse">載入房間中...</div>;

      const currentPlayer = gameState.players[gameState.turnIndex];
      const isMyTurn = currentPlayer?.id === user.uid && !currentPlayer.isBankrupt;
      const myPlayerData = gameState.players.find(p => p.id === user.uid);

      if (gameState.status === 'lobby') return (
         <div className="min-h-screen flex items-center justify-center p-4 bg-gray-100">
            <div className="bg-white p-8 rounded-3xl w-full max-w-md text-center shadow-xl border border-gray-200">
              <h2 className="text-2xl font-bold text-gray-500 mb-2">準備大廳</h2><div className="text-5xl font-black text-blue-600 tracking-widest mb-8">{roomId}</div>
              <ul className="mb-8 space-y-3">{gameState.players.map((p,i) => <li key={p.id} className="text-left font-bold text-lg p-3 bg-gray-50 rounded-xl flex items-center gap-3 border" style={{borderColor: p.color}}><span className="text-2xl">{p.avatar}</span> {p.name} <span className="text-xs text-gray-400 ml-auto">{TALENTS.find(t=>t.id===p.talent)?.name}</span></li>)}</ul>
              {!myPlayerData ? <button onClick={joinGameSlot} className="w-full bg-green-500 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-green-600 transition">加入遊戲</button> : (gameState.players[0].id===user.uid ? <button onClick={()=>updateGame({status:'playing', turnStartTime:Date.now()})} className="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-blue-700 transition">開始遊戲</button> : <p className="text-gray-500 font-bold animate-pulse">等待房主開始...</p>)}
            </div>
         </div>
      );

      return (
        <div className="min-h-screen p-2 md:p-4 flex flex-col gap-4 max-w-[1200px] mx-auto bg-white">
          
          {/* 棋盤區域置頂 */}
          <div className="w-full bg-gray-100 p-3 rounded-2xl shadow-inner aspect-square max-h-[80vh] mx-auto relative border border-gray-300">
            <div className="w-full h-full grid grid-cols-11 grid-rows-11 gap-[2px] bg-gray-300">
              {BOARD_SPACES.map((space, index) => {
                let row, col;
                if (index <= 10) { row = 11; col = 11 - index; } else if (index <= 20) { col = 1; row = 11 - (index - 10); } else if (index <= 30) { row = 1; col = index - 19; } else { col = 11; row = index - 29; }
                const propData = gameState.properties[space.id];
                const owner = propData?.ownerId ? gameState.players.find(p => p.id === propData.ownerId) : null;
                // 使用視覺位置狀態來渲染棋子
                const playersOnSpace = gameState.players.filter(p => (visualPos[p.id] ?? p.position) === space.id && !p.isBankrupt);
                const bgStyle = owner ? { backgroundColor: HEX_TO_RGBA(owner.color, 0.15) } : { backgroundColor: '#ffffff' };
                const isMonopoly = owner && BOARD_SPACES.filter(s => s.color === space.color).every(s => gameState.properties[s.id]?.ownerId === owner.id);

                return (
                  <div key={space.id} onClick={()=>setSelectedSpaceId(space.id)} className={`flex flex-col items-center justify-between text-[0.6rem] font-bold text-center relative overflow-hidden cursor-pointer hover:brightness-95 transition ${isMonopoly?'ring-inset ring-2 ring-yellow-400':''}`} style={{ gridRow: row, gridColumn: col, ...bgStyle }}>
                    {space.color && <div className="w-full h-3 md:h-4 shadow-sm" style={{ backgroundColor: COLOR_MAP[space.color] }}></div>}
                    <div className="flex-grow flex flex-col items-center justify-center w-full px-0.5 z-0 leading-tight text-gray-800">
                       <span>{space.name}</span>
                       {propData?.isLandmark && <span className="text-lg mt-0.5">🏰</span>}
                    </div>
                    {owner && (
                      <div className="absolute bottom-0 w-full h-2 flex items-center justify-center gap-[2px]" style={{ backgroundColor: owner.color }}>
                         {!propData.isLandmark && propData.houses > 0 && Array(propData.houses).fill(0).map((_,i) => <div key={i} className="w-1.5 h-1.5 bg-white rounded-full"></div>)}
                      </div>
                    )}
                    <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex flex-wrap justify-center gap-[1px] z-10 text-base md:text-xl player-token w-full pointer-events-none">
                        {playersOnSpace.map(p => <span key={p.id}>{p.avatar}</span>)}
                        {gameState.boss?.active && gameState.boss.position === space.id && <span className="boss-token relative group">{gameState.boss.avatar}<span className="absolute -top-4 left-1/2 -translate-x-1/2 text-[10px] bg-red-600 text-white px-1 rounded whitespace-nowrap opacity-0 group-hover:opacity-100 transition">HP: {gameState.boss.hp}</span></span>}
                    </div>
                  </div>
                );
              })}

              {/* 棋盤中央區域 */}
              <div className="row-start-2 row-end-11 col-start-2 col-end-11 bg-gray-50 p-4 flex flex-col items-center justify-center relative rounded-xl m-1 shadow-inner border border-gray-200">
                 <div className="absolute top-4 flex flex-col items-center">
                    <div className="text-sm font-bold text-gray-400 tracking-widest">WORLD EVENT</div>
                    <div className="text-2xl font-black text-gray-800 bg-white px-4 py-1 rounded-full shadow border border-gray-100">{gameState.worldEvent.name}</div>
                 </div>

                 <div className="w-full max-w-xs bg-white rounded-2xl p-6 shadow-xl border border-gray-100 flex flex-col items-center transform transition duration-500 hover:scale-105">
                    <div className="text-sm font-bold text-gray-400 mb-1">CURRENT TURN</div>
                    <div className="text-4xl mb-2">{currentPlayer?.avatar}</div>
                    <h3 className="text-2xl font-black text-gray-800" style={{color: currentPlayer?.color}}>{currentPlayer?.name}</h3>
                    
                    <div className="mt-6 flex flex-col w-full gap-3">
                      {isMyTurn && gameState.phase === 'waiting_roll' && <button onClick={rollDice} className="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-lg hover:bg-blue-700 shadow-lg">🎲 擲骰子 ({timeLeft}s)</button>}
                      
                      {isMyTurn && gameState.phase === 'must_action' && gameState.pendingAction?.type === 'buy' && (
                         <div className="flex gap-2">
                           <button onClick={buyProperty} className="flex-1 bg-green-600 text-white py-3 rounded-xl font-black hover:bg-green-700">購買 (${gameState.pendingAction.amount})</button>
                           <button onClick={startAuction} className="flex-1 bg-yellow-500 text-white py-3 rounded-xl font-black hover:bg-yellow-600">放棄/拍賣</button>
                         </div>
                      )}
                      
                      {isMyTurn && gameState.phase === 'must_action' && ['rent', 'tax'].includes(gameState.pendingAction?.type) && (
                         <div className="flex flex-col gap-2">
                            <button onClick={payRentOrTax} className="w-full bg-red-600 text-white py-3 rounded-xl font-black hover:bg-red-700">支付 ${gameState.pendingAction.amount}</button>
                            {gameState.pendingAction.type === 'rent' && (myPlayerData?.items?.shield > 0) && (
                               <button onClick={useShield} className="w-full bg-indigo-600 text-white py-2 rounded-xl font-bold hover:bg-indigo-700">🛡️ 使用免租護盾 (餘: {myPlayerData.items.shield})</button>
                            )}
                         </div>
                      )}

                      {isMyTurn && gameState.phase === 'must_action' && gameState.pendingAction?.type === 'boss_encounter' && (
                         <div className="flex flex-col gap-2 animate-pulse">
                            <div className="text-center font-bold text-red-600 mb-2">遇見 {gameState.boss.name} (HP: {gameState.boss.hp})</div>
                            <button onClick={attackBoss} className="w-full bg-red-600 text-white py-3 rounded-xl font-black hover:bg-red-700">⚔️ 攻擊 ($100)</button>
                            <button onClick={async()=>await updateGame({phase:'end_turn', pendingAction:null, chat: appendLog(gameState.chat, `🏃 ${myPlayerData.name} 選擇不攻擊 Boss，直接逃離了。`)})} className="w-full bg-gray-500 text-white py-2 rounded-xl font-black hover:bg-gray-600">🏃 逃離</button>
                         </div>
                      )}

                      {isMyTurn && gameState.phase === 'end_turn' && <button onClick={forceEndTurn} className="w-full bg-gray-800 text-white py-3 rounded-xl font-black hover:bg-gray-700 shadow-md">結束回合 ({timeLeft}s)</button>}
                      
                      {!isMyTurn && gameState.phase !== 'auction' && <div className="text-gray-400 font-bold text-center bg-gray-50 py-3 rounded-xl">等待動作中... ({timeLeft}s)</div>}
                    </div>
                 </div>

                 {gameState.auction?.active && (
                    <div className="absolute bottom-4 w-full px-8">
                       <div className="bg-yellow-100 border-2 border-yellow-400 rounded-xl p-4 shadow-2xl animate-pulse">
                          <h4 className="font-black text-yellow-800 text-center mb-2">🔨 土地拍賣中 ({timeLeft}s)</h4>
                          <div className="flex justify-between items-center mb-4 text-sm font-bold">
                             <span>標的: {BOARD_SPACES[gameState.auction.spaceId].name}</span>
                             <span className="text-lg text-red-600">最高價: ${gameState.auction.currentBid}</span>
                          </div>
                          <div className="flex gap-2 justify-center">
                             <button onClick={()=>bidAuction(10)} className="bg-white border border-yellow-500 text-yellow-700 px-4 py-2 rounded font-bold hover:bg-yellow-50">+10</button>
                             <button onClick={()=>bidAuction(50)} className="bg-white border border-yellow-500 text-yellow-700 px-4 py-2 rounded font-bold hover:bg-yellow-50">+50</button>
                             <button onClick={()=>bidAuction(100)} className="bg-white border border-yellow-500 text-yellow-700 px-4 py-2 rounded font-bold hover:bg-yellow-50">+100</button>
                          </div>
                       </div>
                    </div>
                 )}
              </div>
            </div>
          </div>

          {/* 底部控制與狀態區域 */}
          <div className="flex flex-col md:flex-row gap-4 w-full">
            <div className="flex-1 flex flex-col gap-4">
              <div className="grid grid-cols-2 gap-3">
                 <button onClick={() => setShowExpansionModal(true)} className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg hover:shadow-xl hover:-translate-y-1 transition duration-300">🌟 擴展中心 (交易/黑市)</button>
                 {myPlayerData && <button onClick={()=>setModalConfig({show:true, msg:'確定要宣告破產嗎？所有資產將會釋出。', customRender: ()=><div className="mt-4 flex gap-2"><button onClick={()=>{declareBankruptcy(); closeModal();}} className="flex-1 bg-red-600 text-white py-2 rounded font-bold">確定破產</button><button onClick={closeModal} className="flex-1 bg-gray-300 py-2 rounded font-bold">取消</button></div>})} className="bg-white border-2 border-red-100 text-red-600 py-4 rounded-2xl font-black text-lg shadow-sm hover:bg-red-50 transition">🏳️ 宣告破產</button>}
              </div>

              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 flex-1 overflow-hidden flex flex-col">
                <div className="bg-gray-50 p-4 border-b flex justify-between items-center">
                   <h2 className="text-lg font-black text-gray-800">玩家狀態 (第 {gameState.roundCount} 輪)</h2>
                   <span className="text-sm font-bold text-gray-400">點擊地圖方塊查看詳細資訊</span>
                </div>
                <div className="p-2 space-y-2 overflow-y-auto hide-scrollbar max-h-60">
                  {gameState.players.map((p, i) => (
                     <div key={p.id} className={`p-4 rounded-xl border flex flex-col gap-2 transition duration-300 ${p.isBankrupt?'opacity-40 grayscale':''} ${i === gameState.turnIndex ? 'shadow-md scale-[1.02] bg-gray-50' : 'bg-white'}`} style={{borderColor: i===gameState.turnIndex ? p.color : '#f3f4f6'}}>
                       <div className="flex justify-between items-center">
                         <span className="font-black text-lg flex items-center gap-2">
                            <span className="text-2xl">{p.avatar}</span> {p.name} 
                            {i === gameState.turnIndex && <span className="text-[10px] bg-black text-white px-2 py-0.5 rounded-full ml-1 animate-pulse">回合中</span>}
                            {p.pet === 'dog' && <span className="text-sm ml-1" title="招財犬">🐕</span>}
                            {p.items?.shield > 0 && <span className="text-sm ml-1 text-blue-500" title="免租護盾">🛡️x{p.items.shield}</span>}
                         </span>
                         <span className="font-black text-green-600 text-xl tracking-tight">💰 {p.money}</span>
                       </div>
                       <div className="flex gap-2 text-xs text-gray-500 font-bold items-center flex-wrap">
                          <span className="bg-gray-100 px-2 py-1 rounded">資產: {Object.values(gameState.properties).filter(x=>x.ownerId===p.id).length}</span>
                          <span className="bg-blue-50 text-blue-700 px-2 py-1 rounded">科技: {p.stocksOwned?.tech||0}</span>
                          <span className="bg-green-50 text-green-700 px-2 py-1 rounded">地產: {p.stocksOwned?.realEstate||0}</span>
                          {p.debt > 0 && <span className="bg-red-50 text-red-600 px-2 py-1 rounded">負債: ${p.debt}</span>}
                       </div>
                     </div>
                  ))}
                </div>
              </div>
            </div>
            
            <div className="flex-1 bg-white rounded-2xl h-64 md:h-auto flex flex-col shadow-sm border border-gray-100 p-3">
               <div className="flex-1 overflow-y-auto text-sm space-y-2 hide-scrollbar mb-2 font-medium bg-gray-50/50 p-2 rounded-xl">
                  {gameState.chat.map(msg=>(
                     <div key={msg.id} className={`${msg.isSystem ? 'bg-blue-50 text-blue-800 border-l-2 border-blue-400 px-2 py-1.5 rounded-r shadow-sm font-bold' : 'text-gray-600'}`}>
                        <span className={msg.isSystem ? "hidden" : "text-gray-900 font-black mr-1"}>{msg.sender}:</span>
                        {msg.text}
                     </div>
                  ))}
                  <div ref={chatEndRef}/>
               </div>
               <form onSubmit={e=>{e.preventDefault();const input=e.target.elements[0].value; if(!input.trim())return; updateGame({chat:[...gameState.chat,{id:Date.now(),sender:myPlayerData?.name||'觀戰',text:input, isSystem:false}].slice(-50)}); e.target.reset();}} className="flex gap-2">
                  <input className="flex-1 bg-gray-50 border border-gray-200 text-gray-800 px-3 py-2 rounded-xl text-sm focus:outline-none focus:border-blue-400 transition" placeholder="輸入聊天訊息..." />
                  <button className="bg-gray-800 text-white px-4 rounded-xl text-sm font-bold hover:bg-gray-700 transition">發送</button>
               </form>
            </div>
          </div>

          <PropertyModal />
          {showExpansionModal && renderExpansionModal()}

          {modalConfig.show && (
             <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[200] p-4 backdrop-blur-sm">
                <div className="bg-white p-8 rounded-2xl max-w-sm w-full text-center shadow-2xl">
                   <p className="text-xl font-bold mb-6 text-gray-800">{modalConfig.msg}</p>
                   {modalConfig.customRender ? modalConfig.customRender() : <button onClick={closeModal} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">確定</button>}
                </div>
             </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
